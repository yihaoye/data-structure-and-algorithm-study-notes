<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">登录并连接网关写路由,玩家点匹配后票据入队,matchmaker 批量配对,allocator 幂等注册房间并起租约,经网关推送地址,双方验 JWT 连入对局进程,最终分为三种结局:有人没到则解散回队,中途掉线宽限重连否则判负,正常结束结果幂等写入全球库。</desc>
