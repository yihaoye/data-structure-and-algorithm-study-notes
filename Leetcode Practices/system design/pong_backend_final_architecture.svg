<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">客户端经三个平面接入:HTTPS 到无状态 API,常驻 WebSocket 到接入网关,对局期直连对局进程池。区域 Cell 内包含无状态 API、接入网关、Redis、matchmaker 加 allocator 与对局进程池;对局结果幂等写入全球 Postgres 主库,由 outbox 驱动 rating 与排行榜,无状态 API 从只读副本查询战绩。</desc>
